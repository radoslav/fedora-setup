---
- name: Configure GRUB timeout
  hosts: localhost
  become: yes

  vars:
    grub_timeout_value: 0

  tasks:
    - name: Set GRUB_TIMEOUT
      lineinfile:
        path: /etc/default/grub
        regexp: '^GRUB_TIMEOUT='
        line: "GRUB_TIMEOUT={{ grub_timeout_value }}"
      notify: Regenerate GRUB config

    - name: Apply pending handler changes
      meta: flush_handlers

  handlers:
    - name: Regenerate GRUB config
      command: grub2-mkconfig -o /boot/grub2/grub.cfg