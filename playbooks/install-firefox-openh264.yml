---
- name: Install OpenH264 for Firefox
  hosts: localhost
  become: yes

  tasks:
    - name: Enable fedora-cisco-openh264 repository
      ini_file:
        path: /etc/yum.repos.d/fedora-cisco-openh264.repo
        section: fedora-cisco-openh264
        option: enabled
        value: "1"
        no_extra_spaces: yes

    - name: Install OpenH264 packages for Firefox
      dnf:
        name:
          - openh264
          - gstreamer1-plugin-openh264
          - mozilla-openh264
        state: present