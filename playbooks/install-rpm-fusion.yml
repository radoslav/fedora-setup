---
- name: Install RPM Fusion and multimedia stack
  hosts: localhost
  become: yes

  tasks:
    - name: Install RPM Fusion free and nonfree release packages
      dnf:
        name:
          - "https://mirrors.rpmfusion.org/free/fedora/rpmfusion-free-release-{{ ansible_facts['distribution_major_version'] }}.noarch.rpm"
          - "https://mirrors.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-{{ ansible_facts['distribution_major_version'] }}.noarch.rpm"
        state: present

    - name: Enable fedora-cisco-openh264 repository
      ini_file:
        path: /etc/yum.repos.d/fedora-cisco-openh264.repo
        section: fedora-cisco-openh264
        option: enabled
        value: "1"
        no_extra_spaces: yes

    - name: Check whether ffmpeg-free is installed
      command: rpm -q ffmpeg-free
      register: ffmpeg_free_check
      changed_when: false
      failed_when: false

    - name: Replace ffmpeg-free with ffmpeg
      command: dnf -y swap ffmpeg-free ffmpeg --allowerasing
      when: ffmpeg_free_check.rc == 0

    - name: Upgrade multimedia package group
      dnf:
        name: "@multimedia"
        state: latest

    - name: Upgrade core package group
      dnf:
        name: "@core"
        state: latest
